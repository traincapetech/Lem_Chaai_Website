<!DOCTYPE html>

<head>

    <meta name="keywords" content="Lemchaai gallery, food photos, shop photos, tea photos, momos photos, restaurant gallery">

    <noscript><link rel="stylesheet" href="styles-optimized.css"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"></noscript>

<body>
    <!-- Navbar Component Container -->
    <div id="navbar-container"></div>

        <section class="gallery-content">
            <div class="container">
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="gallery/Lem_Chaai_Home_Page.png" alt="Lemchaai Home Page" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="gallery/Lem_Chaai_Steamed_Momos.png" alt="Lemchaai Steamed Momos" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="gallery/Lem_Chaai_Shop_Interior.png" alt="Lemchaai Shop Interior" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="gallery/Lem_Chaai_Maggie.png" alt="Lemchaai Fresh Paratha" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="gallery/Delicious Parathas with Raita.png" alt="Lemchaai Fresh Paratha" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="gallery/Lem_Chaai_Happy_Customers.jpeg" alt="Lemchaai Happy Customers" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="gallery/Fresh_Ingredients.png" alt="Lemchaai Fresh Ingredients" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="gallery/Made_with_Love.png" alt="Lemchaai Made with Love" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="gallery/Pizza_Rolls.png" alt="Lemchaai Pizza" style="width: 100%; height: 250px; object-fit: cover; border-radius: 15px;" loading="lazy">
                    </div>
                </div>
                
                <div class="gallery-cta">
                    <h2>Hungry? Order Now!</h2>
                    <p>See something you like? Order directly through WhatsApp</p>
                    <a href="https://wa.me/917838000475?text=Hello%20Lemchaai,%20I'd%20like%20to%20place%20an%20order!" class="cta-button" target="_blank">
                        <i class="fab fa-whatsapp"></i> Order on WhatsApp

                </div>
            </div>

    <!-- Footer Component Container -->
    <div id="footer-container"></div>
